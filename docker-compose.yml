services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: photobiz
      POSTGRES_USER: photobiz
      POSTGRES_PASSWORD: photobiz_dev_password
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photobiz -d photobiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/src/PhotoBIZ.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=photobiz;Username=photobiz;Password=photobiz_dev_password
      ConnectionStrings__Redis: redis:6379
    ports:
      - "5082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: services/api/src/PhotoBIZ.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=photobiz;Username=photobiz;Password=photobiz_dev_password
      ConnectionStrings__Redis: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverse-proxy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  postgres-data:
