name: Deploy Pilot

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore backend
        run: dotnet restore PhotoBIZ.slnx -p:EnableWindowsTargeting=true

      - name: Test backend
        run: dotnet test PhotoBIZ.slnx --configuration Release --verbosity minimal -p:EnableWindowsTargeting=true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/package-lock.json

      - name: Install frontend
        run: npm ci
        working-directory: apps

      - name: Build frontend
        run: npm run build
        working-directory: apps

      - name: Test frontend
        run: npm run test:ci
        working-directory: apps

      - name: Validate production compose
        run: docker compose --env-file infra/production.env.example -f docker-compose.prod.yml config

      - name: Build production backend images
        run: docker compose --env-file infra/production.env.example -f docker-compose.prod.yml build api worker

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/package-lock.json

      - name: Build frontend artifacts
        run: |
          npm ci
          npm run build
        working-directory: apps

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.PHOTOBIZ_DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.PHOTOBIZ_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          echo "GitHub deploy key fingerprint:"
          ssh-keygen -lf ~/.ssh/id_ed25519.pub
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Verify SSH access
        env:
          DEPLOY_HOST: ${{ secrets.PHOTOBIZ_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PHOTOBIZ_DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "whoami"

      - name: Sync repository to Droplet
        env:
          DEPLOY_HOST: ${{ secrets.PHOTOBIZ_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PHOTOBIZ_DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.PHOTOBIZ_DEPLOY_PATH || '/opt/photobiz' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}' && rm -rf '${DEPLOY_PATH}/deploy/admin-web' '${DEPLOY_PATH}/deploy/booth-ui'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '.vs/' \
            --exclude 'backups/' \
            --exclude '**/bin/' \
            --exclude '**/obj/' \
            --exclude '**/node_modules/' \
            --exclude '**/.angular/' \
            --exclude 'api.dev*.log' \
            --exclude 'worker.dev*.log' \
            --exclude 'apps/*.dev*.log' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Restart production stack
        env:
          DEPLOY_HOST: ${{ secrets.PHOTOBIZ_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PHOTOBIZ_DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.PHOTOBIZ_DEPLOY_PATH || '/opt/photobiz' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          test -f .env
          rm -rf deploy/admin-web deploy/booth-ui
          mkdir -p deploy/admin-web deploy/booth-ui
          cp -R apps/dist/admin-web/browser/. deploy/admin-web/
          cp -R apps/dist/booth-ui/browser/. deploy/booth-ui/
          docker compose --env-file .env -f docker-compose.prod.yml up -d --build
          docker compose --env-file .env -f docker-compose.prod.yml ps
          PHOTOBIZ_PILOT_HOST="$(grep -E '^PHOTOBIZ_PILOT_HOST=' .env | tail -n 1 | cut -d '=' -f 2-)"
          PHOTOBIZ_PILOT_HOST="${PHOTOBIZ_PILOT_HOST%\"}"
          PHOTOBIZ_PILOT_HOST="${PHOTOBIZ_PILOT_HOST#\"}"
          PHOTOBIZ_PILOT_HOST="${PHOTOBIZ_PILOT_HOST%\'}"
          PHOTOBIZ_PILOT_HOST="${PHOTOBIZ_PILOT_HOST#\'}"
          if [[ -z "${PHOTOBIZ_PILOT_HOST}" ]]; then
            echo "PHOTOBIZ_PILOT_HOST is missing from .env" >&2
            exit 1
          fi
          for url in \
            "https://api.${PHOTOBIZ_PILOT_HOST}/health" \
            "https://api.${PHOTOBIZ_PILOT_HOST}/api/platform/status" \
            "https://admin.${PHOTOBIZ_PILOT_HOST}" \
            "https://booth.${PHOTOBIZ_PILOT_HOST}"
          do
            for attempt in 1 2 3 4 5 6; do
              if curl -fsS "${url}" >/dev/null; then
                echo "Smoke check passed: ${url}"
                break
              fi
              if [[ "${attempt}" == "6" ]]; then
                echo "Smoke check failed: ${url}" >&2
                docker compose --env-file .env -f docker-compose.prod.yml logs --tail=200 reverse-proxy api >&2
                exit 1
              fi
              sleep 10
            done
          done
          REMOTE
