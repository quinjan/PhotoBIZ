<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoBIZ Booth UI Vintage Theme</title>
  <style>
    /*
      PhotoBIZ Booth UI vintage theme concept.
      Target first: 15.6-inch 16:9 touch screen.

      Porting notes:
      - screenStates uses the current BoothStageScreenState names.
      - boothState values come from docs/STATE_MODEL.md and current Booth UI mapping.
      - Most states use a centered film-card composition.
      - Payment-related states keep the same centered card language where possible.
      - This mockup avoids responsive variants for now while the visual direction is being refined.
    */

    :root {
      --cream: #fff0cf;
      --paper: #f7ddb0;
      --paper-dark: #dfb878;
      --red: #b92b23;
      --red-dark: #701915;
      --brown-900: #1f120d;
      --brown-800: #332018;
      --brown-700: #4b3023;
      --brown-500: #815238;
      --brown-300: #bd8050;
      --mint: #6f9381;
      --ink: #23150f;
      --line-light: rgba(255, 240, 207, 0.48);
      --line-dark: rgba(35, 21, 15, 0.24);
      --shadow: rgba(18, 9, 5, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #20110c;
      color: var(--cream);
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
    }

    button {
      font: inherit;
    }

    .mockup-shell {
      display: grid;
      grid-template-columns: 292px 1fr;
      min-height: 100vh;
    }

    .controls {
      background: var(--paper);
      border-right: 4px solid var(--red-dark);
      color: var(--ink);
      display: grid;
      gap: 16px;
      grid-template-rows: auto auto 1fr;
      min-height: 100vh;
      overflow: auto;
      padding: 18px;
    }

    .controls h1 {
      color: var(--red-dark);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 25px;
      line-height: 1.05;
      margin: 0 0 8px;
    }

    .controls p {
      color: #634838;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      margin: 0;
    }

    .current-state {
      border-top: 1px solid var(--line-dark);
      border-bottom: 1px solid var(--line-dark);
      display: grid;
      gap: 4px;
      padding: 12px 0;
    }

    .current-state strong {
      color: var(--red-dark);
      font-size: 13px;
      text-transform: uppercase;
    }

    .state-nav {
      display: grid;
      gap: 8px;
    }

    .state-nav button {
      align-items: center;
      background: #fff7e8;
      border: 1px solid rgba(35, 21, 15, 0.2);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 3px;
      min-height: 48px;
      padding: 9px 11px;
      text-align: left;
    }

    .state-nav button strong {
      font-size: 14px;
      line-height: 1.1;
    }

    .state-nav button span {
      color: #755443;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .state-nav button.is-active {
      background: var(--red-dark);
      border-color: var(--red-dark);
      color: var(--cream);
    }

    .state-nav button.is-active span {
      color: #ffd598;
    }

    .workbench {
      display: grid;
      min-height: 100vh;
      padding: 20px;
      place-items: center;
    }

    .screen {
      aspect-ratio: 16 / 9;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 235, 186, 0.34), transparent 27%),
        radial-gradient(circle at 82% 76%, rgba(111, 147, 129, 0.18), transparent 27%),
        linear-gradient(120deg, rgba(185, 43, 35, 0.26), transparent 46%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 2px, transparent 2px 10px),
        linear-gradient(135deg, #7a4630 0%, #573220 52%, #24150f 100%);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.5);
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: min(calc(100vh - 40px), 768px);
      overflow: hidden;
      padding: 34px 42px;
      position: relative;
      width: min(calc(100vw - 332px), 1366px);
    }

    .screen::before {
      background:
        linear-gradient(90deg, rgba(255, 240, 207, 0.16) 0 12px, transparent 12px calc(100% - 12px), rgba(255, 240, 207, 0.16) calc(100% - 12px)),
        linear-gradient(rgba(255, 240, 207, 0.16) 0 12px, transparent 12px calc(100% - 12px), rgba(255, 240, 207, 0.16) calc(100% - 12px));
      content: "";
      inset: 0;
      pointer-events: none;
      position: absolute;
    }

    .screen::after {
      background-image:
        linear-gradient(45deg, rgba(255, 240, 207, 0.075) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 240, 207, 0.075) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255, 240, 207, 0.075) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255, 240, 207, 0.075) 75%);
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      background-size: 20px 20px;
      bottom: 0;
      content: "";
      height: 64px;
      left: 0;
      opacity: 0.48;
      pointer-events: none;
      position: absolute;
      right: 0;
      animation: dinerTextureDrift 18s linear infinite;
    }

    .topbar,
    .stage,
    .bottombar {
      position: relative;
      z-index: 1;
    }

    .topbar {
      align-items: start;
      animation: softFadeIn 520ms ease-out both;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
    }

    .topbar.has-back {
      align-items: center;
      grid-template-columns: auto 1fr auto;
    }

    .back-button {
      align-items: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.36), transparent),
        rgba(255, 240, 207, 0.16);
      border: 1px solid rgba(255, 240, 207, 0.48);
      border-radius: 8px;
      color: var(--cream);
      cursor: pointer;
      display: inline-grid;
      font-size: 13px;
      font-weight: 900;
      gap: 8px;
      grid-template-columns: auto auto;
      height: 44px;
      letter-spacing: 1.2px;
      min-width: 104px;
      padding: 0 14px;
      text-transform: uppercase;
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .back-button::before {
      border-right: 9px solid currentColor;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      content: "";
      height: 0;
      width: 0;
    }

    .back-button:focus-visible,
    .back-button:hover {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.46), transparent),
        rgba(255, 240, 207, 0.24);
      box-shadow: 0 0 22px rgba(255, 208, 141, 0.22);
      outline: 0;
      transform: translateY(-2px);
    }

    .back-button:active {
      transform: translateY(1px);
    }

    .back-modal {
      align-items: center;
      background: rgba(31, 18, 13, 0.62);
      display: none;
      inset: 0;
      justify-content: center;
      padding: 42px;
      position: absolute;
      z-index: 4;
    }

    .back-modal.is-open {
      display: flex;
    }

    .back-modal-card {
      animation: ticketPop 420ms cubic-bezier(0.18, 1.1, 0.28, 1) both;
      background:
        linear-gradient(90deg, transparent 0 calc(100% - 16px), rgba(112, 25, 21, 0.14) calc(100% - 16px)),
        repeating-linear-gradient(0deg, rgba(112, 25, 21, 0.08) 0 1px, transparent 1px 11px),
        var(--cream);
      border: 6px solid #fff7e8;
      border-radius: 8px;
      box-shadow: 0 28px 58px rgba(18, 9, 5, 0.46);
      color: var(--ink);
      display: grid;
      gap: 20px;
      justify-items: center;
      max-width: 520px;
      padding: 34px;
      text-align: center;
      width: 100%;
    }

    .back-modal-card h2 {
      color: var(--red-dark);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 48px;
      line-height: 0.95;
      margin: 0;
    }

    .back-modal-card p {
      color: #5a3c2c;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.25;
      margin: 0;
    }

    .back-modal-actions {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 4px;
      width: 100%;
    }

    .back-modal-action {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.26), transparent),
        var(--red);
      border: 2px solid #ffd08d;
      border-radius: 8px;
      box-shadow: 0 8px 0 var(--red-dark), 0 18px 30px rgba(0, 0, 0, 0.24);
      color: var(--cream);
      cursor: pointer;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.8px;
      min-height: 58px;
      padding: 0 18px;
      text-transform: uppercase;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .back-modal-action.is-secondary {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent),
        var(--brown-700);
      box-shadow: 0 8px 0 var(--brown-900), 0 18px 30px rgba(0, 0, 0, 0.22);
    }

    .back-modal-action:focus-visible,
    .back-modal-action:hover {
      outline: 0;
      transform: translateY(-2px);
    }

    .back-modal-action:active {
      box-shadow: 0 4px 0 var(--red-dark), 0 10px 18px rgba(0, 0, 0, 0.24);
      transform: translateY(4px);
    }

    .booth-name {
      display: grid;
      gap: 5px;
    }

    .booth-name strong {
      color: var(--cream);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 29px;
      line-height: 1;
    }

    .booth-name span,
    .state-chip,
    .label {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }

    .booth-name span {
      color: #ffd38f;
    }

    .state-chip {
      background: rgba(255, 240, 207, 0.12);
      border: 1px solid rgba(255, 240, 207, 0.36);
      border-radius: 8px;
      color: var(--cream);
      min-height: 42px;
      padding: 12px 14px;
    }

    .stage {
      display: grid;
      min-height: 0;
      place-items: center;
      padding: 18px 0 12px;
    }

    .film-card {
      align-items: stretch;
      animation: filmCardEnter 620ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
      display: grid;
      grid-template-columns: 64px minmax(0, 720px) 64px;
      min-height: 470px;
      width: min(100%, 880px);
    }

    .film-edge {
      background: #100907;
      border: 2px solid rgba(255, 240, 207, 0.34);
      display: grid;
      gap: 12px;
      overflow: hidden;
      padding: 14px 10px;
    }

    .film-edge.left {
      border-radius: 8px 0 0 8px;
      border-right: 0;
    }

    .film-edge.right {
      border-left: 0;
      border-radius: 0 8px 8px 0;
    }

    .film-hole {
      animation: filmHoleDrift 4.8s linear infinite;
      background: var(--cream);
      border-radius: 4px;
      min-height: 25px;
    }

    .film-body {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.5), transparent 30%),
        var(--cream);
      border: 6px solid #fff7e8;
      box-shadow: 0 24px 50px var(--shadow);
      color: var(--ink);
      display: grid;
      gap: 18px;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      padding: 28px 34px;
      position: relative;
    }

    .film-body::after {
      background:
        linear-gradient(110deg, transparent 0 38%, rgba(255, 255, 255, 0.26) 46%, transparent 54%),
        radial-gradient(circle at 50% 0%, rgba(255, 210, 137, 0.18), transparent 48%);
      content: "";
      inset: 0;
      opacity: 0;
      pointer-events: none;
      position: absolute;
    }

    .label {
      animation: softFadeIn 420ms ease-out 160ms both;
      color: var(--red-dark);
    }

    .film-body h2,
    .ticket h2 {
      animation: textRise 520ms ease-out 210ms both;
      color: var(--red-dark);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 62px;
      line-height: 0.94;
      margin: 0;
      text-align: center;
    }

    .film-copy {
      align-self: center;
      display: grid;
      gap: 18px;
      justify-items: center;
      text-align: center;
    }

    .film-copy p,
    .ticket p {
      animation: textRise 520ms ease-out 300ms both;
      color: #5a3c2c;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.25;
      margin: 0;
      max-width: 560px;
      text-align: center;
    }

    .offer-line {
      align-items: center;
      animation: textRise 520ms ease-out 390ms both;
      background: #f9e7c5;
      border: 1px solid rgba(112, 25, 21, 0.22);
      border-radius: 8px;
      color: var(--brown-800);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      min-height: 74px;
      padding: 13px 16px;
      text-align: left;
      width: 100%;
    }

    .offer-line > div {
      justify-self: start;
      min-width: 0;
    }

    .offer-line strong {
      color: var(--red-dark);
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 26px;
      line-height: 1.05;
    }

    .offer-line span {
      display: block;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.3;
      margin-top: 3px;
    }

    .price-pill {
      background: var(--red-dark);
      border: 2px solid var(--paper-dark);
      border-radius: 8px;
      color: var(--cream);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      font-weight: 900;
      min-width: 126px;
      padding: 12px 14px;
      text-align: center;
    }

    .progress-track {
      background: rgba(112, 25, 21, 0.16);
      border-radius: 8px;
      height: 15px;
      overflow: hidden;
      width: 100%;
    }

    .progress-fill {
      animation: progressLoad 850ms ease-out 360ms both;
      background: linear-gradient(90deg, var(--red-dark), var(--red), #efae5e);
      height: 100%;
      overflow: hidden;
      position: relative;
      width: var(--progress);
    }

    .progress-fill::after {
      animation: progressShine 1.8s ease-in-out 900ms infinite;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.52), transparent);
      content: "";
      inset: 0;
      position: absolute;
      transform: translateX(-120%);
    }

    .timeout-panel {
      display: grid;
      gap: 10px;
      width: 100%;
    }

    .timeout-meta {
      align-items: center;
      color: #5a3c2c;
      display: flex;
      font-size: 13px;
      font-weight: 900;
      justify-content: space-between;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .timeout-meta strong {
      color: var(--red-dark);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      letter-spacing: 0;
      line-height: 1;
      text-transform: none;
    }

    .timeout-panel .progress-fill {
      animation: none;
      transition: width 350ms linear;
      width: 100%;
    }

    .auto-return-badge {
      align-items: center;
      animation: softFadeIn 420ms ease-out 260ms both;
      background: var(--red-dark);
      border: 2px solid var(--paper-dark);
      border-radius: 8px;
      box-shadow: 0 10px 22px rgba(112, 25, 21, 0.2);
      color: var(--cream);
      display: inline-grid;
      gap: 4px;
      justify-items: center;
      min-width: 118px;
      padding: 9px 14px 10px;
      position: absolute;
      right: 26px;
      top: 24px;
      z-index: 2;
    }

    .auto-return-badge span {
      color: #ffdca6;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.4px;
      line-height: 1;
      text-transform: uppercase;
    }

    .auto-return-badge strong {
      color: var(--cream);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 26px;
      line-height: 1;
    }

    .ticket-topline {
      align-items: start;
      display: grid;
      grid-template-columns: 1fr auto;
      width: 100%;
    }

    .ticket-topline .label {
      justify-self: start;
      padding-top: 9px;
      text-align: left;
    }

    .ticket .auto-return-badge {
      justify-self: end;
      min-width: 108px;
      padding: 7px 12px 8px;
      position: static;
    }

    .ticket .auto-return-badge strong {
      font-size: 23px;
    }

    .primary-action {
      animation: buttonSettle 520ms ease-out 460ms both;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.26), transparent),
        var(--red);
      border: 2px solid #ffd08d;
      border-radius: 8px;
      box-shadow: 0 10px 0 var(--red-dark), 0 20px 34px rgba(0, 0, 0, 0.28);
      color: var(--cream);
      cursor: pointer;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 0;
      min-height: 68px;
      min-width: 250px;
      padding: 0 28px;
      text-transform: uppercase;
    }

    .secondary-action {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent),
        var(--brown-700);
      box-shadow: 0 10px 0 var(--brown-900), 0 20px 34px rgba(0, 0, 0, 0.26);
    }

    .bottombar {
      align-items: center;
      animation: softFadeIn 520ms ease-out 420ms both;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 18px;
    }

    .hint {
      color: #ffe0aa;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.3;
    }

    .hint.right {
      text-align: right;
    }

    .payment-stage {
      display: grid;
      place-items: center;
      width: 100%;
    }

    .ticket {
      animation: ticketPop 560ms cubic-bezier(0.18, 1.1, 0.28, 1) both;
      background:
        linear-gradient(90deg, transparent 0 calc(100% - 18px), rgba(112, 25, 21, 0.16) calc(100% - 18px)),
        repeating-linear-gradient(0deg, rgba(112, 25, 21, 0.08) 0 1px, transparent 1px 11px),
        var(--cream);
      border: 6px solid #fff7e8;
      border-radius: 8px;
      box-shadow: 0 26px 56px var(--shadow);
      color: var(--ink);
      display: grid;
      gap: 18px;
      justify-items: center;
      max-width: 720px;
      min-height: 370px;
      padding: 34px;
      position: relative;
      text-align: center;
      width: 100%;
    }

    .ticket::before,
    .ticket::after {
      background: var(--brown-700);
      border-radius: 50%;
      content: "";
      height: 34px;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
    }

    .ticket::before {
      left: -21px;
    }

    .ticket::after {
      right: -21px;
    }

    .ticket .primary-action {
      margin-top: 8px;
      min-width: 310px;
    }

    .payment-choice-card {
      min-height: 480px;
      width: min(100%, 900px);
    }

    .payment-choice-card .film-body {
      gap: 20px;
      padding: 26px 34px 30px;
    }

    .payment-options-head {
      border-bottom: 2px solid rgba(112, 25, 21, 0.16);
      color: var(--ink);
      display: grid;
      gap: 10px;
      justify-items: center;
      padding: 8px 140px 16px;
      text-align: center;
    }

    .payment-choice-card .auto-return-badge {
      right: 24px;
      top: 22px;
    }

    .payment-options-head h2 {
      color: var(--red-dark);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 54px;
      line-height: 0.95;
      margin: 0;
    }

    .payment-due {
      background: var(--red-dark);
      border: 2px solid var(--paper-dark);
      border-radius: 8px;
      box-shadow: 0 12px 24px rgba(112, 25, 21, 0.22);
      color: var(--cream);
      display: grid;
      gap: 2px;
      font-family: Georgia, "Times New Roman", serif;
      margin-top: 4px;
      min-width: 190px;
      padding: 10px 22px 12px;
      place-items: center;
    }

    .payment-due span {
      color: #ffdca6;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .payment-due strong {
      color: var(--cream);
      font-size: 32px;
      line-height: 1;
    }

    .ticket .payment-due {
      margin: -4px 0 2px;
      min-width: 170px;
      padding: 9px 20px 11px;
    }

    .payment-choice-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .payment-choice {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.58), transparent 45%),
        #fff8eb;
      border: 3px solid rgba(112, 25, 21, 0.24);
      border-radius: 8px;
      box-shadow: 0 10px 22px rgba(112, 25, 21, 0.12);
      color: var(--ink);
      cursor: pointer;
      display: grid;
      min-height: 150px;
      overflow: hidden;
      padding: 20px;
      place-items: center;
      position: relative;
      text-align: center;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .payment-choice:focus-visible,
    .payment-choice:hover {
      border-color: #ffd08d;
      box-shadow: 0 16px 30px rgba(112, 25, 21, 0.18), 0 0 28px rgba(255, 208, 141, 0.24);
      outline: 0;
      transform: translateY(-3px);
    }

    .payment-choice:active {
      transform: translateY(2px) scale(0.992);
    }

    .payment-choice h3 {
      color: var(--red-dark);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 54px;
      line-height: 1;
      margin: 0;
    }

    .qr-stage {
      align-items: center;
      display: grid;
      gap: 26px;
      grid-template-columns: 340px minmax(0, 1fr);
      max-width: 850px;
      width: 100%;
    }

    .qr-card {
      animation: ticketPop 560ms cubic-bezier(0.18, 1.1, 0.28, 1) both;
      background: #fff7e8;
      border: 8px solid var(--cream);
      border-radius: 8px;
      box-shadow: 0 24px 52px var(--shadow);
      display: grid;
      gap: 14px;
      justify-items: center;
      padding: 24px;
    }

    .qr-code {
      background: #fffdf5;
      border: 8px solid #fffdf5;
      display: grid;
      gap: 3px;
      grid-template-columns: repeat(13, 1fr);
      height: 246px;
      width: 246px;
    }

    .qr-cell {
      background: #f9efd9;
      min-height: 0;
    }

    .qr-cell.is-dark {
      background: var(--ink);
    }

    .qr-copy {
      animation: textRise 520ms ease-out 180ms both;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.48), transparent 34%),
        var(--cream);
      border: 6px solid #fff7e8;
      border-radius: 8px;
      box-shadow: 0 24px 52px var(--shadow);
      color: var(--ink);
      display: grid;
      gap: 16px;
      padding: 30px;
    }

    .qr-copy h2 {
      color: var(--red-dark);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 52px;
      line-height: 0.96;
      margin: 0;
    }

    .qr-copy p {
      color: #5a3c2c;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.28;
      margin: 0;
    }

    .tone-muted .screen {
      filter: saturate(0.82);
    }

    .tone-ok .state-chip {
      border-color: rgba(205, 236, 195, 0.6);
    }

    .tone-danger .screen {
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 235, 186, 0.25), transparent 27%),
        linear-gradient(120deg, rgba(185, 43, 35, 0.32), transparent 46%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 2px, transparent 2px 10px),
        linear-gradient(135deg, #783024 0%, #563020 52%, #24150f 100%);
    }

    .tone-danger .state-chip,
    .tone-danger .primary-action {
      border-color: #ffb28b;
    }

    .state-offer .primary-action {
      animation:
        buttonSettle 520ms ease-out 460ms both,
        dinerButtonPulse 2.6s ease-in-out 1.1s infinite;
    }

    .state-waiting .ticket,
    .state-session .film-body {
      box-shadow: 0 24px 50px var(--shadow), 0 0 0 1px rgba(255, 208, 141, 0.2);
    }

    .state-approved .screen {
      animation: flashBulb 780ms ease-out both;
    }

    .state-approved .film-body::after,
    .state-completed .film-body::after {
      animation: paperGlow 1.8s ease-out 450ms both;
    }

    .state-completed .film-body h2 {
      animation: completeStamp 620ms cubic-bezier(0.2, 1.25, 0.35, 1) 240ms both;
    }

    .state-offline .state-chip,
    .state-error .state-chip,
    .state-expired .state-chip,
    .state-cancelled .state-chip,
    .state-payment-failed .state-chip {
      animation: alertPulse 2.2s ease-in-out infinite;
    }

    @keyframes filmCardEnter {
      0% {
        opacity: 0;
        transform: translateY(34px) rotate(-1.8deg) scale(0.965);
      }

      72% {
        opacity: 1;
        transform: translateY(-5px) rotate(0.55deg) scale(1.008);
      }

      100% {
        opacity: 1;
        transform: translateY(0) rotate(0deg) scale(1);
      }
    }

    @keyframes ticketPop {
      0% {
        opacity: 0;
        transform: translateY(24px) scale(0.94);
      }

      70% {
        opacity: 1;
        transform: translateY(-4px) scale(1.015);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes textRise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes softFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes buttonSettle {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes dinerButtonPulse {
      0%,
      100% {
        box-shadow: 0 10px 0 var(--red-dark), 0 20px 34px rgba(0, 0, 0, 0.28), 0 0 0 rgba(255, 208, 141, 0);
      }

      50% {
        box-shadow: 0 10px 0 var(--red-dark), 0 20px 34px rgba(0, 0, 0, 0.28), 0 0 28px rgba(255, 208, 141, 0.58);
      }
    }

    @keyframes progressLoad {
      from {
        width: 0;
      }

      to {
        width: var(--progress);
      }
    }

    @keyframes progressShine {
      0% {
        transform: translateX(-120%);
      }

      55%,
      100% {
        transform: translateX(120%);
      }
    }

    @keyframes filmHoleDrift {
      from {
        transform: translateY(-37px);
      }

      to {
        transform: translateY(37px);
      }
    }

    @keyframes dinerTextureDrift {
      from {
        background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      }

      to {
        background-position: 20px 20px, 20px 30px, 30px 10px, 10px 20px;
      }
    }

    @keyframes flashBulb {
      0% {
        filter: brightness(1);
      }

      18% {
        filter: brightness(1.45);
      }

      100% {
        filter: brightness(1);
      }
    }

    @keyframes paperGlow {
      0% {
        opacity: 0;
      }

      35% {
        opacity: 1;
      }

      100% {
        opacity: 0.18;
      }
    }

    @keyframes completeStamp {
      0% {
        opacity: 0;
        transform: scale(1.22) rotate(-2deg);
      }

      65% {
        opacity: 1;
        transform: scale(0.96) rotate(0.4deg);
      }

      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes alertPulse {
      0%,
      100% {
        box-shadow: 0 0 0 rgba(255, 178, 139, 0);
      }

      50% {
        box-shadow: 0 0 24px rgba(255, 178, 139, 0.48);
      }
    }

    @keyframes dotPulse {
      0%,
      100% {
        box-shadow: 0 0 0 rgba(185, 43, 35, 0);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 0 18px rgba(185, 43, 35, 0.55);
        transform: scale(1.18);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="mockup-shell">
    <aside class="controls">
      <header>
        <h1>Booth UI Vintage Theme</h1>
        <p>Simple 1950s diner/photo-strip direction. Fixed 16:9 mockup first.</p>

      <section class="current-state" id="currentState"></section>
      <nav class="state-nav" id="stateNav" aria-label="Booth state preview"></nav>
    </aside>

    <main class="workbench">
      <section id="screenMount"></section>
    </main>
  </div>

  <script>

    const screenStates = [

      {

      },
      {

      {

      },
      {

        label: "Cancelled",
        boothState: "RECENT CANCELLED",
        tone: "danger",
        layout: "payment",
        eyebrow: "Cancelled",
        title: "Request Cancelled",
        message: "Please ask the cashier.",
        action: "Back to Start",
        autoReturnSeconds: 15,
        footerLeft: "Cashier cancelled",
        footerRight: "Start again when ready",
        progress: "0%"
      },
      {
        id: "payment-failed",
        label: "Payment Failed",
        boothState: "RECENT PAYMENT_FAILED",
        tone: "danger",
        layout: "payment",
        eyebrow: "Payment Failed",
        title: "Payment Failed",
        message: "Please ask the cashier.",
        action: "Back to Start",
        autoReturnSeconds: 15,
        footerLeft: "Future provider state",

      {

        eyebrow: "Recovery Needed",
        title: "Call Cashier",
        message: "Staff can recover this booth.",
        action: "Check Status",
        footerLeft: "Backend recovery",
        footerRight: "Do not restart",
        progress: "25%"
      }
    ];

    const defaultStateId = "offer";
    let countdownTimer = null;
    let pendingBackTarget = null;
    let pendingPaymentTarget = null;

    function getState(id) {
      return screenStates.find((state) => state.id === id) || screenStates.find((state) => state.id === defaultStateId);
    }

    function humanize(value) {
      return value.replaceAll("_", " ");
    }

    function renderFilmEdge(side) {
      return `
        <div class="film-edge ${side}" aria-hidden="true">
          <div class="film-hole"></div>
          <div class="film-hole"></div>
          <div class="film-hole"></div>
          <div class="film-hole"></div>
          <div class="film-hole"></div>
          <div class="film-hole"></div>
          <div class="film-hole"></div>
        </div>
      `;
    }

    function renderOfferLine() {
      return `
        <div class="offer-line">
          <div>
            <strong>${boothConfig.offerName}</strong>
            <span>${boothConfig.printEntitlement}</span>
          </div>
          <div class="price-pill">${boothConfig.offerPrice}</div>
        </div>
      `;
    }

    function renderAction(state, className = "primary-action") {
      if (!state.action) {
        return "";
      }

      const dangerClass = state.tone === "danger" ? " secondary-action" : "";
      return `<button type="button" class="${className}${dangerClass}">${state.action}</button>`;
    }

    function renderProgress(state) {
      return `
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" style="--progress: ${state.progress};"></div>
        </div>
      `;
    }

    function renderTimeout(state) {
      return `
        <div class="timeout-panel" data-timeout-total="${state.timeoutSeconds}">
          <div class="timeout-meta">
            <span>Time Left</span>
            <strong data-countdown>${state.timeoutSeconds}s</strong>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill timeout-fill" data-timeout-fill style="--progress: 100%;"></div>
          </div>
        </div>
      `;
    }

    function renderAutoReturnBadge(state) {
      if (!state.autoReturnSeconds) {
        return "";
      }

      return `
        <div class="auto-return-badge" aria-label="Auto return countdown">
          <span>Auto Return</span>
          <strong data-auto-return-countdown>${state.autoReturnSeconds}s</strong>
        </div>
      `;
    }

    function renderPaymentOptionsLayout(state) {
      const options = state.paymentOptions.map((option) => `
        <article class="payment-choice" role="button" tabindex="0" aria-label="${option.title}" data-payment-choice data-payment-title="${option.title}" data-payment-target="${option.target}">
          <h3>${option.title}</h3>
        </article>
      `).join("");
      const headingLabel = state.eyebrow ? `<div class="label">${state.eyebrow}</div>` : "";

      return `
        <div class="film-card payment-choice-card">
          ${renderFilmEdge("left")}
          <article class="film-body">
            ${renderAutoReturnBadge(state)}
            <header class="payment-options-head">
              ${headingLabel}
              <h2>${state.title}</h2>
              <div class="payment-due"><span>Amount Due</span><strong>${boothConfig.offerPrice}</strong></div>
            </header>
            <div class="payment-choice-grid">
              ${options}
            </div>
          </article>
          ${renderFilmEdge("right")}
        </div>
      `;
    }

    function renderQrCode() {
      const darkCells = new Set([
        0, 1, 2, 3, 5, 6, 8, 9, 10, 11, 12,
        13, 16, 18, 21, 25,
        26, 28, 29, 31, 32, 34, 36, 38,
        39, 42, 44, 45, 48, 51,
        52, 53, 54, 56, 58, 60, 61, 62, 64,
        66, 68, 70, 73, 75, 77,
        78, 79, 81, 83, 84, 87, 89, 90,
        91, 94, 95, 97, 100, 102, 103,
        104, 106, 108, 110, 111, 112, 116,
        117, 119, 120, 123, 125, 127, 128,
        130, 131, 132, 134, 136, 139, 140, 141, 142,
        143, 146, 148, 151, 153, 155,
        156, 157, 158, 160, 162, 164, 166, 167, 168
      ]);

      return Array.from({ length: 169 }, (_, index) => {
        const className = darkCells.has(index) ? "qr-cell is-dark" : "qr-cell";
        return `<span class="${className}"></span>`;
      }).join("");
    }

    function renderQrWaitingLayout(state) {
      return `
        <div class="qr-stage">
          <aside class="qr-card" aria-label="Payment QR code">
            <div class="qr-code" aria-hidden="true">${renderQrCode()}</div>
          </aside>

          <article class="qr-copy">
            <div class="label">${state.eyebrow}</div>
            <h2>${state.title}</h2>
            <p>${state.message}</p>
            ${renderTimeout(state)}
          </article>
        </div>
      `;
    }

    function renderFilmLayout(state) {
      return `
        <div class="film-card">
          ${renderFilmEdge("left")}
          <article class="film-body">
            ${renderAutoReturnBadge(state)}
            <div class="label">${state.eyebrow}</div>
            <div class="film-copy">
              <h2>${state.title}</h2>
              <p>${state.message}</p>
              ${state.showOffer ? renderOfferLine() : renderProgress(state)}
            </div>
            ${renderAction(state)}
          </article>
          ${renderFilmEdge("right")}
        </div>
      `;
    }

    function renderPaymentLayout(state) {
      const ticketHeader = state.autoReturnSeconds
        ? `
          <div class="ticket-topline">
            <div class="label">${state.eyebrow}</div>
            ${renderAutoReturnBadge(state)}
          </div>
        `
        : `<div class="label">${state.eyebrow}</div>`;

      return `
        <div class="payment-stage">
          <article class="ticket">
            ${ticketHeader}
            <h2>${state.title}</h2>
            <p>${state.message}</p>
            ${state.timeoutSeconds ? renderTimeout(state) : renderProgress(state)}
            ${renderAction(state)}
          </article>
        </div>
      `;
    }

    function renderBackConfirmModal(state) {
      if (!state.backTarget) {
        return "";
      }

      const message = state.backConfirmMessage || "Return to the previous screen?";

      return `
        <div class="back-modal" data-back-modal role="dialog" aria-modal="true" aria-labelledby="backModalTitle">
          <article class="back-modal-card">
            <div class="label">Confirm</div>
            <h2 id="backModalTitle">Go Back?</h2>
            <p>${message}</p>
            <div class="back-modal-actions">
              <button type="button" class="back-modal-action is-secondary" data-back-cancel>Stay</button>
              <button type="button" class="back-modal-action" data-back-confirm>Go Back</button>
            </div>
          </article>
        </div>
      `;
    }

    function renderPaymentConfirmModal(state) {
      if (state.layout !== "payment-options") {
        return "";
      }

      return `
        <div class="back-modal" data-payment-modal role="dialog" aria-modal="true" aria-labelledby="paymentModalTitle">
          <article class="back-modal-card">
            <div class="label">Confirm Payment</div>
            <h2 id="paymentModalTitle">Use Payment?</h2>
            <p data-payment-modal-message>Continue with this payment option?</p>
            <div class="back-modal-actions">
              <button type="button" class="back-modal-action is-secondary" data-payment-cancel>Change</button>
              <button type="button" class="back-modal-action" data-payment-confirm>Confirm</button>
            </div>
          </article>
        </div>
      `;
    }

    function renderScreen(state) {
      const toneClass = state.tone ? `tone-${state.tone}` : "";
      const stateClass = `state-${state.id}`;
      const backButton = state.backTarget
        ? `<button type="button" class="back-button" data-back-target="${state.backTarget}">Back</button>`
        : "";
      const topbarClass = state.backTarget ? "topbar has-back" : "topbar";
      const content =
        state.layout === "payment-options"
          ? renderPaymentOptionsLayout(state)
          : state.layout === "qr-waiting"
            ? renderQrWaitingLayout(state)
            : state.layout === "payment"
              ? renderPaymentLayout(state)
              : renderFilmLayout(state);

      return `
        <section class="${toneClass} ${stateClass}">
          <div class="screen">
            <header class="${topbarClass}">
              ${backButton}
              <div class="booth-name">
                <strong>${boothConfig.boothName}</strong>
                <span>${boothConfig.sessionLabel}</span>
              </div>
              <div class="state-chip">${humanize(state.boothState)}</div>
            </header>

            <main class="stage">
              ${content}
            </main>

            <footer class="bottombar">
              <div class="hint">${state.footerLeft}</div>
              <div></div>
              <div class="hint right">${state.footerRight}</div>
            </footer>

            ${renderBackConfirmModal(state)}
            ${renderPaymentConfirmModal(state)}
          </div>
        </section>
      `;
    }

    function stopCountdown() {
      if (countdownTimer !== null) {
        window.clearInterval(countdownTimer);
        countdownTimer = null;
      }
    }

    function startCountdown(state) {
      stopCountdown();

      const totalSeconds = state.timeoutSeconds || state.autoReturnSeconds;

      if (!totalSeconds) {
        return;
      }

      const countdown = document.querySelector("[data-countdown], [data-auto-return-countdown]");
      const fill = document.querySelector("[data-timeout-fill]");

      if (!countdown) {
        return;
      }

      const startedAt = Date.now();

      const update = () => {
        const elapsedSeconds = Math.floor((Date.now() - startedAt) / 1000);
        const remainingSeconds = Math.max(0, totalSeconds - elapsedSeconds);
        const remainingPercent = Math.max(0, (remainingSeconds / totalSeconds) * 100);

        countdown.textContent = `${remainingSeconds}s`;
        if (fill) {
          fill.style.width = `${remainingPercent}%`;
        }

        if (remainingSeconds === 0) {
          stopCountdown();
          if (state.autoReturnSeconds) {
            setState(state.autoReturnTarget || defaultStateId);
          }
        }
      };

      update();
      countdownTimer = window.setInterval(update, 1000);
    }

    function openBackConfirm(target) {
      const modal = document.querySelector("[data-back-modal]");
      pendingBackTarget = target;

      if (!modal) {
        setState(target);
        return;
      }

      modal.classList.add("is-open");
      const stayButton = modal.querySelector("[data-back-cancel]");
      if (stayButton) {
        stayButton.focus();
      }
    }

    function closeBackConfirm() {
      const modal = document.querySelector("[data-back-modal]");
      pendingBackTarget = null;

      if (modal) {
        modal.classList.remove("is-open");
      }
    }

    function openPaymentConfirm(title, target) {
      const modal = document.querySelector("[data-payment-modal]");
      const modalTitle = document.getElementById("paymentModalTitle");
      const modalMessage = document.querySelector("[data-payment-modal-message]");
      pendingPaymentTarget = target;

      if (!modal) {
        setState(target);
        return;
      }

      if (modalTitle) {
        modalTitle.textContent = `Use ${title}?`;
      }

      if (modalMessage) {
        modalMessage.textContent = `${boothConfig.offerPrice} will continue with ${title}.`;
      }

      modal.classList.add("is-open");
      const confirmButton = modal.querySelector("[data-payment-confirm]");
      if (confirmButton) {
        confirmButton.focus();
      }
    }

    function closePaymentConfirm() {
      const modal = document.querySelector("[data-payment-modal]");
      pendingPaymentTarget = null;

      if (modal) {
        modal.classList.remove("is-open");
      }
    }

    function attachPaymentChoiceHandlers() {
      document.querySelectorAll("[data-payment-choice]").forEach((choice) => {
        choice.addEventListener("click", () => {
          openPaymentConfirm(choice.dataset.paymentTitle, choice.dataset.paymentTarget);
        });

        choice.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openPaymentConfirm(choice.dataset.paymentTitle, choice.dataset.paymentTarget);
          }
        });
      });

      const modal = document.querySelector("[data-payment-modal]");
      const cancelButton = document.querySelector("[data-payment-cancel]");
      const confirmButton = document.querySelector("[data-payment-confirm]");

      if (cancelButton) {
        cancelButton.addEventListener("click", closePaymentConfirm);
      }

      if (confirmButton) {
        confirmButton.addEventListener("click", () => {
          if (pendingPaymentTarget) {
            setState(pendingPaymentTarget);
          }
        });
      }

      if (modal) {
        modal.addEventListener("click", (event) => {
          if (event.target === modal) {
            closePaymentConfirm();
          }
        });
      }
    }

    function attachBackConfirmHandlers() {
      const backButton = document.querySelector("[data-back-target]");
      const modal = document.querySelector("[data-back-modal]");
      const cancelButton = document.querySelector("[data-back-cancel]");
      const confirmButton = document.querySelector("[data-back-confirm]");

      if (backButton) {
        backButton.addEventListener("click", () => openBackConfirm(backButton.dataset.backTarget));
      }

      if (cancelButton) {
        cancelButton.addEventListener("click", closeBackConfirm);
      }

      if (confirmButton) {
        confirmButton.addEventListener("click", () => {
          if (pendingBackTarget) {
            setState(pendingBackTarget);
          }
        });
      }

      if (modal) {
        modal.addEventListener("click", (event) => {
          if (event.target === modal) {
            closeBackConfirm();
          }
        });
      }
    }

    function setState(id) {
      const state = getState(id);
      pendingBackTarget = null;
      pendingPaymentTarget = null;
      document.getElementById("screenMount").innerHTML = renderScreen(state);
      startCountdown(state);
      attachBackConfirmHandlers();
      attachPaymentChoiceHandlers();
      document.getElementById("currentState").innerHTML = `
        <strong>${state.label}</strong>
        <p>${state.id} | ${humanize(state.boothState)}</p>
      `;

      document.querySelectorAll(".state-nav button").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.state === state.id);
      });

      const url = new URL(window.location.href);
      url.searchParams.set("screen", state.id);
      window.history.replaceState({}, "", url);
    }

    function renderNavigation(activeId) {
      const nav = document.getElementById("stateNav");
      nav.innerHTML = screenStates.map((state) => `
        <button type="button" data-state="${state.id}" class="${state.id === activeId ? "is-active" : ""}">
          <strong>${state.label}</strong>
          <span>${state.id}</span>
        </button>
      `).join("");

      nav.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => setState(button.dataset.state));
      });
    }

    const requestedState = new URLSearchParams(window.location.search).get("screen") || defaultStateId;
    const normalizedRequestedState = requestedState === "payment-qr-available" ? "payment" : requestedState;
    renderNavigation(normalizedRequestedState);
    setState(normalizedRequestedState);
  </script>
</body>
</html>
