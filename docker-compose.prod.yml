services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photobiz}
      POSTGRES_USER: ${POSTGRES_USER:-photobiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/src/PhotoBIZ.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-photobiz};Username=${POSTGRES_USER:-photobiz};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      Cors__AllowedOrigins__0: https://admin.${PHOTOBIZ_PILOT_HOST:?PHOTOBIZ_PILOT_HOST is required}
      Cors__AllowedOrigins__1: https://booth.${PHOTOBIZ_PILOT_HOST}
      DataProtection__KeyRingPath: /var/photobiz/keys
      Database__ApplyMigrationsOnStartup: "true"
      ForwardedHeaders__Enabled: "true"
    volumes:
      - data-protection-keys:/var/photobiz/keys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: services/api/src/PhotoBIZ.Worker/Dockerfile
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-photobiz};Username=${POSTGRES_USER:-photobiz};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?CADDY_ACME_EMAIL is required for ZeroSSL certificates}
      PHOTOBIZ_PILOT_HOST: ${PHOTOBIZ_PILOT_HOST:?PHOTOBIZ_PILOT_HOST is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ./deploy/admin-web:/srv/admin:ro
      - ./deploy/booth-ui:/srv/booth:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  data-protection-keys:
  caddy-data:
  caddy-config:
